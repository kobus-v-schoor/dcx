# dcx Configuration Reference
# This file documents all available config options with their defaults.
# Copy and edit as ~/.config/dcx/config.yaml (user) or .devcontainer/dcx.yaml (project).

# --- Logging ---

# Set the log verbosity level. Accepted values: debug, info, warn, error.
# Can also be set via the DCX_LOG_LEVEL environment variable or the --log-level CLI flag.
# Precedence (high to low): CLI flag → environment variable → project config → user config.
# Default: warn
log_level: warn

# --- SSH Agent Forwarding ---

# Automatically detect and forward SSH agent socket into the container.
# When enabled, dcx reads SSH_AUTH_SOCK from the host, bind-mounts the socket
# into the container, and sets SSH_AUTH_SOCK inside the container.
# If the socket is missing or SSH_AUTH_SOCK is unset, forwarding is silently skipped.
ssh:
  # Forward the SSH agent socket from the host.
  # Can also be set via the DCX_SSH_FORWARD_AGENT environment variable.
  # Default: true
  forward_agent: true

  # Container path for the bind-mounted SSH agent socket.
  # Can also be set via the DCX_SSH_AGENT_SOCKET_TARGET environment variable.
  # Default: /opt/dcx/sockets/ssh-agent.sock
  # agent_socket_target: /opt/dcx/sockets/ssh-agent.sock

# --- Git Config Forwarding ---

# Automatically forward git configuration files into the container.
# When enabled, dcx bind-mounts each listed file into <mount_base>/<index>-<basename>
# and sets GIT_CONFIG_GLOBAL to the first mounted file's container path.
git:
  # Enable git config file injection.
  # Can also be set via the DCX_GIT_INJECT_CONFIGS environment variable.
  # Default: true
  inject_configs: true

  # List of git config files to forward. Supports ~ for home directory.
  # Missing files are silently skipped with a warning.
  # The first file in the list that exists on the host gets GIT_CONFIG_GLOBAL
  # set to its container path, regardless of its filename.
  # Default: [~/.gitconfig]
  configs:
    - ~/.gitconfig
    # - ~/.gitignore_global

  # Container directory under which git config files are bind-mounted.
  # Can also be set via the DCX_GIT_MOUNT_BASE environment variable.
  # Default: /opt/dcx/git
  # mount_base: /opt/dcx/git

# --- GitHub CLI Proxy ---

# Configure the GitHub CLI reverse proxy for repository-level token scoping.
# When enabled, dcx exec starts a local HTTPS reverse proxy that intercepts
# all gh CLI requests from the container and enforces repository-level access
# control on the user's GitHub token. Requests targeting repositories other
# than the configured one are rejected with 403 Forbidden. This prevents
# accidental or malicious access to other repositories from within the
# devcontainer.
github_cli:
  # Enable the GitHub CLI proxy for dcx exec sessions.
  # Can also be set via the DCX_GITHUB_CLI_ENABLED environment variable.
  # Default: false
  enabled: false

  # The allowed repository in "owner/repo" format. Only API requests targeting
  # this repository are forwarded to api.github.com; all other repo-scoped
  # requests are rejected. Non-repo paths (e.g. /user, /graphql) are always
  # allowed. If empty, the repository is auto-detected from the git remote
  # origin URL of the workspace.
  # Can also be set via the DCX_GITHUB_CLI_REPOSITORY environment variable.
  # Default: "" (auto-detect)
  # repository: owner/repo

# --- Docker Compose Integration ---

# Connect the dev container to a Compose project's network.
# This is the primary project-level setting.
compose_integration:
  # Path to the docker-compose.yml, relative to the project root.
  # Can also be set via the DCX_COMPOSE_INTEGRATION_COMPOSE_FILE environment variable.
  compose_file: ../docker-compose.yml

  # Strategy: "network_join" (default) or "overlay"
  # Can also be set via the DCX_COMPOSE_INTEGRATION_STRATEGY environment variable.
  strategy: network_join

  # Required only for "overlay" strategy: the Compose service to use as the dev container.
  # Can also be set via the DCX_COMPOSE_INTEGRATION_DEV_SERVICE environment variable.
  # dev_service: app

# --- Default Features ---

# List of devcontainer features to inject via --additional-features.
# Features from user and project config are union-merged; on ID conflict, project wins.
# Feature IDs without a version tag automatically get ":latest" appended.
default_features:
  - id: ghcr.io/devcontainers/features/github-cli
    options:
      version: latest
  - id: ghcr.io/devcontainers/features/docker-outside-of-docker
    options: {}

# --- Bind Mounts ---

# List of bind mounts to pass to the devcontainer CLI via --mount flags.
# Source paths support ~ (home directory) and ${VAR} (environment variable) expansion.
# If a resolved source path doesn't exist on the host, the mount is skipped with a warning.
# User and project mounts are concatenated; duplicate targets produce a warning.
mounts:
  - source: ~/.config/opencode
    target: /home/vscode/.config/opencode
    read_only: true
  - source: /data/project
    target: /workspace

# --- Environment Variable Passthrough ---

# List of environment variables to pass from the host to the devcontainer.
# Two formats are supported:
#   - "NAME" — reads host env var NAME, sets NAME in the container (shorthand).
#   - "CONTAINER_NAME=${HOST_VAR}" — reads HOST_VAR from the host, sets CONTAINER_NAME (explicit).
#
# The value part (after '=') supports composite expressions that mix variable
# substitutions and literal text, e.g. "PATH=${PATH}:/opt/bin". Each ${VAR}
# reference is replaced with the corresponding host environment variable value.
# Text outside ${...} is preserved as-is. If the value contains no ${...}
# references at all, it is treated as a plain literal string, which is useful
# for setting fixed values via config, e.g. "MY_FLAG=true".
#
# If a referenced host variable is not set, a warning is logged and the
# reference is substituted with an empty string. This allows declaring a
# superset of variables — only those existing on the current machine are
# forwarded with their values.
# User and project environment lists are concatenated; project entries appear after user entries.
#
# Env vars are injected into the override devcontainer.json's containerEnv property,
# making them Docker-level environment variables that are persistent in the running
# container (visible via env, docker exec, etc.). This is different from remoteEnv
# which only applies to VS Code server processes, or --remote-env flags which only
# apply during lifecycle command execution.
environment:
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - SOMETHING_ELSE=${HOST_SECRET_VAR}
  # - PATH=${PATH}:/opt/bin
  # - MY_FLAG=true
