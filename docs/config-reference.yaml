# dcx Configuration Reference
# This file documents all available config options with their defaults.
# Copy and edit as ~/.config/dcx/config.yaml (user) or .devcontainer/dcx.yaml (project).

# --- Logging ---

# Set the log verbosity level. Accepted values: debug, info, warn, error.
# Can also be set via the DCX_LOG_LEVEL environment variable or the --log-level CLI flag.
# Precedence (high to low): CLI flag → environment variable → project config → user config.
# Default: warn
log_level: warn

# --- SSH and Git Auto-Detection ---

# Automatically detect and forward SSH agent socket.
# Default: true
ssh_forwarding: true

# Automatically forward ~/.gitconfig into the container.
# Default: true
git_config_forwarding: true

# --- Docker Compose Integration ---

# Connect the dev container to a Compose project's network.
# This is the primary project-level setting.
compose_integration:
  # Path to the docker-compose.yml, relative to the project root.
  # Can also be set via the DCX_COMPOSE_INTEGRATION_COMPOSE_FILE environment variable.
  compose_file: ../docker-compose.yml

  # Strategy: "network_join" (default) or "overlay"
  # Can also be set via the DCX_COMPOSE_INTEGRATION_STRATEGY environment variable.
  strategy: network_join

  # Required only for "overlay" strategy: the Compose service to use as the dev container.
  # Can also be set via the DCX_COMPOSE_INTEGRATION_DEV_SERVICE environment variable.
  # dev_service: app

# --- Default Features ---

# List of devcontainer features to inject via --additional-features.
# Features from user and project config are union-merged; on ID conflict, project wins.
# Feature IDs without a version tag automatically get ":latest" appended.
default_features:
  - id: ghcr.io/devcontainers/features/github-cli
    options:
      version: latest
  - id: ghcr.io/devcontainers/features/docker-outside-of-docker
    options: {}

# --- Bind Mounts ---

# List of bind mounts to pass to the devcontainer CLI via --mount flags.
# Source paths support ~ (home directory) and ${VAR} (environment variable) expansion.
# If a resolved source path doesn't exist on the host, the mount is skipped with a warning.
# User and project mounts are concatenated; duplicate targets produce a warning.
mounts:
  - source: ~/.config/opencode
    target: /home/vscode/.config/opencode
    read_only: true
  - source: /data/project
    target: /workspace
