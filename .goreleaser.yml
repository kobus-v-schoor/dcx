version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dcx
    main: ./cmd/dcx
    binary: dcx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - name_template: >-
      dcx_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats: ["tar.gz"]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  abbrev: -1

release:
  github:
    owner: kobus-v-schoor
    name: dcx
